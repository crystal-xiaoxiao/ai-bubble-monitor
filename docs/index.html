<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AI 泡沫监测 · The Bubble Watch</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Noto+Serif+SC:wght@400;500;600;700;900&family=IBM+Plex+Mono:wght@400;500;600&display=swap" />
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #FBF7F0;
    --ink: #1A1815;
    --red: #7C1D1D;
    --yellow: #A8761A;
    --green: #1F4D2C;
    --muted: #666;
    --warm: #3A3530;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: "Noto Serif SC", "Source Han Serif SC", "Songti SC", serif;
    min-height: 100vh;
  }
  .mono { font-family: "IBM Plex Mono", monospace; }
  .display { font-family: "Playfair Display", "Noto Serif SC", serif; }
  .container { max-width: 1280px; margin: 0 auto; padding: clamp(20px, 4vw, 48px); }

  /* Masthead */
  header.masthead { border-bottom: 3px double var(--ink); padding-bottom: 20px; margin-bottom: 32px; }
  .masthead-row { display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 12px; }
  .kicker { font-family: "IBM Plex Mono", monospace; font-size: 11px; letter-spacing: 0.3em; color: var(--red); margin-bottom: 8px; }
  h1.title { font-family: "Playfair Display", "Noto Serif SC", serif; font-size: clamp(36px, 6vw, 64px); font-weight: 900; line-height: 1.05; margin: 0; letter-spacing: -0.02em; }
  h1.title em { font-style: italic; font-weight: 400; }
  .issue-meta { text-align: right; font-family: "IBM Plex Mono", monospace; font-size: 12px; line-height: 1.8; }
  .issue-meta .small { margin-top: 8px; color: var(--muted); }

  /* Headline */
  .headline { display: grid; grid-template-columns: minmax(0, 2fr) minmax(0, 3fr); gap: 32px; align-items: stretch; margin-bottom: 48px; }
  @media (max-width: 720px) { .headline { grid-template-columns: 1fr; } }
  .big-number {
    background: var(--ink); color: var(--bg); padding: 32px;
    display: flex; flex-direction: column; justify-content: space-between; min-height: 320px;
  }
  .big-number .label { font-family: "IBM Plex Mono", monospace; font-size: 11px; letter-spacing: 0.2em; opacity: 0.6; }
  .big-number .value {
    font-family: "Playfair Display", serif; font-size: clamp(80px, 14vw, 144px);
    font-weight: 900; line-height: 0.9; letter-spacing: -0.04em;
  }
  .big-number .value sup { font-size: 0.4em; vertical-align: super; }
  .big-number .breakdown { font-family: "IBM Plex Mono", monospace; font-size: 12px; margin-top: 12px; opacity: 0.7; line-height: 1.6; }
  .big-number .footer { border-top: 1px solid rgba(251,247,240,0.2); padding-top: 12px; font-family: "IBM Plex Mono", monospace; font-size: 10px; letter-spacing: 0.15em; opacity: 0.5; }

  .verdict { display: flex; flex-direction: column; justify-content: space-between; }
  .verdict .label { font-family: "IBM Plex Mono", monospace; font-size: 11px; letter-spacing: 0.2em; color: var(--red); margin-bottom: 12px; }
  .verdict h2 { font-family: "Playfair Display", "Noto Serif SC", serif; font-size: clamp(28px, 4vw, 42px); font-weight: 700; line-height: 1.15; margin: 0 0 16px 0; letter-spacing: -0.01em; }
  .verdict p { font-size: 17px; line-height: 1.7; margin: 0; color: var(--warm); }
  .verdict p em { font-style: italic; }
  .verdict .footnote { margin-top: 24px; border-top: 1px solid var(--ink); padding-top: 16px; font-family: "IBM Plex Mono", monospace; font-size: 11px; display: flex; justify-content: space-between; flex-wrap: wrap; gap: 12px; }

  /* Trend */
  section.trend { margin-bottom: 48px; border-top: 1px solid var(--ink); border-bottom: 1px solid var(--ink); padding: 24px 0; }
  .trend-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 20px; flex-wrap: wrap; gap: 8px; }
  .trend-header h3 { font-family: "Playfair Display", serif; font-size: 22px; font-weight: 700; margin: 0; }
  .trend-header h3 em { font-style: italic; font-weight: 400; font-size: 0.7em; }
  .trend-legend { font-family: "IBM Plex Mono", monospace; font-size: 11px; color: var(--muted); display: flex; gap: 16px; flex-wrap: wrap; }
  #trend-chart-wrap { position: relative; height: 220px; }

  /* Categories */
  section.category { margin-bottom: 40px; }
  .category-header { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 16px; border-bottom: 2px solid var(--ink); padding-bottom: 8px; flex-wrap: wrap; gap: 8px; }
  .category-header .titles { display: flex; align-items: baseline; gap: 16px; flex-wrap: wrap; }
  .category-header h3 { font-family: "Playfair Display", "Noto Serif SC", serif; font-size: 28px; font-weight: 900; margin: 0; letter-spacing: -0.01em; }
  .category-header .en { font-family: "IBM Plex Mono", monospace; font-size: 11px; letter-spacing: 0.2em; color: var(--muted); }
  .category-header .counts { font-family: "IBM Plex Mono", monospace; font-size: 12px; color: var(--muted); }
  .counts .red { color: var(--red); }
  .counts .yellow { color: var(--yellow); }

  .indicator-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(min(100%, 380px), 1fr)); gap: 16px; }
  article.indicator { border: 1px solid var(--ink); background: var(--bg); padding: 18px; position: relative; display: flex; flex-direction: column; gap: 10px; }
  article.indicator .status-bar { position: absolute; top: 0; left: 0; width: 100%; height: 4px; }
  .status-bar.red { background: var(--red); }
  .status-bar.yellow { background: var(--yellow); }
  .status-bar.green { background: var(--green); }
  article.indicator .head { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; margin-top: 4px; }
  article.indicator .name-en { font-family: "IBM Plex Mono", monospace; font-size: 10px; letter-spacing: 0.15em; color: var(--muted); }
  article.indicator .name-zh { font-family: "Noto Serif SC", serif; font-size: 15px; font-weight: 600; margin-top: 2px; }
  .badge { font-family: "IBM Plex Mono", monospace; font-size: 10px; padding: 4px 8px; letter-spacing: 0.1em; font-weight: 600; white-space: nowrap; color: var(--bg); }
  .badge.red { background: var(--red); }
  .badge.yellow { background: var(--yellow); }
  .badge.green { background: var(--green); }
  article.indicator .number { font-family: "Playfair Display", serif; font-size: 38px; font-weight: 700; line-height: 1; letter-spacing: -0.02em; }
  article.indicator .number .unit { font-size: 0.5em; font-weight: 400; margin-left: 2px; }
  article.indicator .note { font-family: "Noto Serif SC", serif; font-size: 13px; color: var(--warm); line-height: 1.55; font-style: italic; }
  article.indicator .meta { border-top: 1px dashed #999; padding-top: 8px; font-family: "IBM Plex Mono", monospace; font-size: 10px; color: var(--muted); display: flex; justify-content: space-between; flex-wrap: wrap; gap: 4px; }
  article.indicator.stale::after { content: "STALE"; position: absolute; top: 8px; right: 8px; font-family: "IBM Plex Mono", monospace; font-size: 9px; padding: 2px 5px; background: #ddd; color: #555; letter-spacing: 0.1em; }

  /* WoW */
  section.wow { margin-bottom: 40px; background: var(--ink); color: var(--bg); padding: 28px; }
  section.wow .label { font-family: "IBM Plex Mono", monospace; font-size: 11px; letter-spacing: 0.2em; opacity: 0.6; margin-bottom: 16px; }
  .wow-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(min(100%, 280px), 1fr)); gap: 20px; }
  .wow-item .tag { font-family: "IBM Plex Mono", monospace; font-size: 10px; margin-bottom: 4px; }
  .wow-item .tag.up { color: var(--yellow); }
  .wow-item .tag.down { color: #7DB37C; }
  .wow-item .tag.flat { color: #999; }
  .wow-item .text { font-family: "Noto Serif SC", serif; font-size: 14px; line-height: 1.6; }

  /* Watch */
  section.watch { margin-bottom: 48px; }
  section.watch h3 { font-family: "Playfair Display", "Noto Serif SC", serif; font-size: 24px; font-weight: 700; margin: 0 0 16px 0; border-bottom: 1px solid var(--ink); padding-bottom: 8px; }
  section.watch h3 em { font-style: italic; font-weight: 400; }
  .watch-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(min(100%, 320px), 1fr)); gap: 16px; }
  .watch-item { border-left: 3px solid var(--red); padding-left: 14px; }
  .watch-item .icon { font-family: "Playfair Display", serif; font-size: 20px; font-weight: 700; color: var(--red); margin-bottom: 4px; }
  .watch-item .title { font-family: "Noto Serif SC", serif; font-size: 15px; font-weight: 600; margin-bottom: 6px; }
  .watch-item .desc { font-family: "Noto Serif SC", serif; font-size: 13px; line-height: 1.6; color: var(--warm); }

  /* Footer */
  footer.method { border-top: 3px double var(--ink); padding-top: 24px; margin-top: 48px; font-family: "IBM Plex Mono", monospace; font-size: 11px; color: var(--muted); line-height: 1.7; }
  .method-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(min(100%, 240px), 1fr)); gap: 24px; }
  .method-grid h4 { color: var(--ink); font-weight: 600; margin: 0 0 6px 0; font-family: inherit; font-size: 11px; }

  /* Loading state */
  .loading { padding: 80px 0; text-align: center; font-family: "IBM Plex Mono", monospace; color: var(--muted); }
  .error { padding: 40px; background: #fee; border-left: 4px solid var(--red); margin: 32px 0; font-family: "IBM Plex Mono", monospace; font-size: 12px; color: var(--red); }
</style>
</head>
<body>
<div class="container" id="root">
  <div class="loading">Loading data...</div>
</div>

<script>
const CATEGORY_ORDER = [
  { key: 'valuation',        zh: '估值',     en: 'VALUATION' },
  { key: 'capital',          zh: '资金面',    en: 'CAPITAL' },
  { key: 'market_structure', zh: '市场结构',  en: 'MARKET STRUCTURE' },
  { key: 'credit',           zh: '信用',     en: 'CREDIT' },
  { key: 'fundamentals',     zh: '基本面',    en: 'FUNDAMENTALS' },
  { key: 'macro',            zh: '宏观',     en: 'MACRO' }
];

const WATCH_LIST = [
  { icon: '①', title: 'Hyperscaler Capex 指引', desc: '任何一家 Mag7 在下次季报下调当年 capex 即转 RED——结构性顶部信号' },
  { icon: '②', title: 'Fed 政策路径', desc: '油价/CPI 若迫使 Fed 重启加息，与 1999-2000、1845 铁路狂热顶部完全同构' },
  { icon: '③', title: 'CoreWeave / Nebius 信用', desc: '数据中心 ABS 利差走阔 50bps+ 是 vendor financing 链条松动的最早信号' },
  { icon: '④', title: 'OpenAI 审计师披露', desc: 'Burry 提出但未确认。任何 round-tripping 调查都是即时 RED' },
  { icon: '⑤', title: 'Anthropic IPO 时点', desc: '若 10 月按计划推进，"AI 公司 IPO 洪流"指标可能转 RED' },
  { icon: '⑥', title: 'Mag7 内部人减持', desc: '当前类 Thiel 案例零星出现，需观察是否扩散至 Mag7 高管' }
];

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function statusBadge(status) {
  const map = { red: '● RED', yellow: '◐ YELLOW', green: '○ GREEN' };
  return `<span class="badge ${status}">${map[status] || status}</span>`;
}

function render(data) {
  const s = data.summary;
  const indicators = data.indicators;
  const issueNo = String(data.issue_number).padStart(3, '0');
  const headlineColor = s.red_pct >= 60 ? '#E63946' : s.red_pct >= 40 ? '#E89B3C' : 'var(--bg)';

  const root = document.getElementById('root');
  root.innerHTML = `
    <header class="masthead">
      <div class="masthead-row">
        <div>
          <div class="kicker">CRYSTAL · WEEKLY INTELLIGENCE BRIEF</div>
          <h1 class="title">AI 泡沫监测<br/><em>The Bubble Watch</em></h1>
        </div>
        <div class="issue-meta">
          <div>ISSUE NO. ${issueNo}</div>
          <div>${escapeHtml(data.as_of_date)}</div>
          <div class="small">${s.total_indicators} INDICATORS · 6 CATEGORIES</div>
        </div>
      </div>
    </header>

    <section class="headline">
      <div class="big-number">
        <div class="label">RED LIGHT RATIO</div>
        <div>
          <div class="value" style="color:${headlineColor}">${s.red_pct.toFixed(1)}<sup>%</sup></div>
          <div class="breakdown">
            ${s.red_count} 红 / ${s.yellow_count} 黄 / ${s.green_count} 绿<br/>
            阈值: 60% = 系统性顶部
          </div>
        </div>
        <div class="footer">WEIGHTED RISK SCORE: ${s.weighted_risk_score.toFixed(1)}%</div>
      </div>
      <div class="verdict">
        <div>
          <div class="label">本周判读 · THIS WEEK'S VERDICT</div>
          <h2>${escapeHtml(s.verdict_label)}</h2>
          <p>${escapeHtml(s.verdict_desc)}</p>
        </div>
        <div class="footnote">
          <span>Issue ${issueNo} · ${escapeHtml(data.as_of_date)}</span>
          <span>对照: 2000-03 (CAPE 44.19, NDX -78%)</span>
        </div>
      </div>
    </section>

    <section class="trend">
      <div class="trend-header">
        <h3>红灯比例趋势 <em>· 8-Week Trend</em></h3>
        <div class="trend-legend">
          <span><span style="color:var(--red)">●</span> Red %</span>
          <span><span style="color:var(--yellow)">●</span> Risk Score</span>
          <span style="color:var(--red)">--- 60% 阈值</span>
        </div>
      </div>
      <div id="trend-chart-wrap"><canvas id="trend-chart"></canvas></div>
    </section>

    ${CATEGORY_ORDER.map(cat => {
      const items = indicators.filter(i => i.category === cat.key);
      if (!items.length) return '';
      const r = items.filter(i => i.status === 'red').length;
      const y = items.filter(i => i.status === 'yellow').length;
      return `
        <section class="category">
          <div class="category-header">
            <div class="titles">
              <h3>${cat.zh}</h3>
              <span class="en">${cat.en}</span>
            </div>
            <div class="counts">
              ${items.length} 个指标 · <span class="red">${r} 红</span> · <span class="yellow">${y} 黄</span>
            </div>
          </div>
          <div class="indicator-grid">
            ${items.map(ind => `
              <article class="indicator${ind.stale ? ' stale' : ''}">
                <div class="status-bar ${ind.status}"></div>
                <div class="head">
                  <div>
                    <div class="name-en">${escapeHtml(ind.name_en)}</div>
                    <div class="name-zh">${escapeHtml(ind.name_zh)}</div>
                  </div>
                  ${statusBadge(ind.status)}
                </div>
                <div class="number">${escapeHtml(ind.value_display || ind.value)}</div>
                <div class="note">${escapeHtml(ind.note)}</div>
                <div class="meta">
                  <span>${escapeHtml(ind.threshold_text)}</span>
                  <span>${escapeHtml(ind.source_name)}</span>
                </div>
              </article>
            `).join('')}
          </div>
        </section>
      `;
    }).join('')}

    ${(data.wow_changes && data.wow_changes.length) ? `
      <section class="wow">
        <div class="label">本周关键变化 · WEEK-OVER-WEEK CHANGES</div>
        <div class="wow-grid">
          ${data.wow_changes.map(w => {
            const tagClass = w.type === 'status_upgrade' ? 'up' : w.type === 'status_downgrade' ? 'down' : 'flat';
            const tagLabel = w.type === 'status_upgrade' ? '▲ 风险升高' : w.type === 'status_downgrade' ? '▼ 风险下降' : '━ 持平';
            return `
              <div class="wow-item">
                <div class="tag ${tagClass}">${tagLabel}</div>
                <div class="text">${escapeHtml(w.note)}</div>
              </div>
            `;
          }).join('')}
        </div>
      </section>
    ` : ''}

    <section class="watch">
      <h3>观察清单 · <em>What to Watch</em></h3>
      <div class="watch-grid">
        ${WATCH_LIST.map(w => `
          <div class="watch-item">
            <div class="icon">${w.icon}</div>
            <div class="title">${escapeHtml(w.title)}</div>
            <div class="desc">${escapeHtml(w.desc)}</div>
          </div>
        `).join('')}
      </div>
    </section>

    <footer class="method">
      <div class="method-grid">
        <div>
          <h4>方法论</h4>
          <div>23 个领先指标，分 6 类。每个指标按其历史阈值评级 RED / YELLOW / GREEN。整体红灯比例 ≥60% 为系统性顶部信号；加权风险分 = (红×1.0 + 黄×0.5) / 总数。关键阈值锚定历史泡沫。</div>
        </div>
        <div>
          <h4>历史对照</h4>
          <div>2000 dot-com、1845 铁路狂热、1996 telecom 泡沫顶部前 6-12 个月，下列指标均闪烁: 内部人减持、capex/FCF 背离、广度恶化、循环融资、CEO 对冲表态。</div>
        </div>
        <div>
          <h4>免责</h4>
          <div>本文为框架研究，非投资建议。指标阈值随研究演进调整。Issue ${issueNo} · ${escapeHtml(data.as_of_date)}.</div>
        </div>
      </div>
    </footer>
  `;

  drawTrend(data);
}

function drawTrend(data) {
  const seed = data.history_seed || [];
  if (!seed.length) return;
  const ctx = document.getElementById('trend-chart');
  if (!ctx) return;
  new Chart(ctx, {
    type: 'line',
    data: {
      labels: seed.map(s => s.week),
      datasets: [
        {
          label: 'Red %',
          data: seed.map(s => s.red_pct),
          borderColor: '#7C1D1D',
          backgroundColor: '#7C1D1D',
          borderWidth: 2.5,
          tension: 0.3,
          pointRadius: 4
        },
        {
          label: 'Risk Score',
          data: seed.map(s => s.risk_score),
          borderColor: '#A8761A',
          backgroundColor: '#A8761A',
          borderWidth: 1.5,
          borderDash: [3, 3],
          tension: 0.3,
          pointRadius: 3
        }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#1A1815',
          titleFont: { family: 'IBM Plex Mono' },
          bodyFont: { family: 'IBM Plex Mono' }
        },
        annotation: {}
      },
      scales: {
        x: { ticks: { font: { family: 'IBM Plex Mono', size: 11 }, color: '#1A1815' }, grid: { display: false } },
        y: {
          min: 0, max: 70,
          ticks: { font: { family: 'IBM Plex Mono', size: 11 }, color: '#1A1815', callback: v => v + '%' },
          grid: { color: 'rgba(0,0,0,0.05)' }
        }
      }
    }
  });
}

async function load() {
  try {
    const r = await fetch('./data/latest.json?t=' + Date.now());
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const data = await r.json();
    render(data);
  } catch (e) {
    document.getElementById('root').innerHTML = `
      <div class="error">数据加载失败: ${escapeHtml(e.message)}<br>检查 data/latest.json 是否存在</div>
    `;
  }
}
load();
</script>
</body>
</html>
